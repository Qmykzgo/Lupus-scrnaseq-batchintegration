name: lupus-batch-integration
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.4
  - matplotlib>=3.7
  - seaborn>=0.13
  - statsmodels>=0.14
  - python-igraph>=0.11
  - leidenalg>=0.10
  - pytest>=7.4
  - pip
  - pip:
      - scanpy>=1.10
      - anndata>=0.10
      - harmonypy>=0.0.10      # Harmony integration
      - bbknn>=1.6.0           # BBKNN integration
      - scvi-tools>=1.1        # scVI integration
      - scib>=1.1.5            # integration benchmarking
      - pydeseq2>=0.4.10       # pseudobulk differential expression
      - gseapy>=1.1.0          # GSEA against MSigDB Hallmark sets
      - openpyxl>=3.1          # excel I/O, in case of supplementary metadata files
